# ============================================
# Restaurant OS - Production Deployment Workflow
# Manual trigger with environment protection
# ============================================

name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version tag to deploy (e.g., v1.0.0 or commit SHA)'
        required: false
        default: 'latest'
        type: string
      skip_tests:
        description: 'Skip pre-deployment tests'
        required: false
        default: false
        type: boolean
      force_deploy:
        description: 'Force deployment even with warnings'
        required: false
        default: false
        type: boolean

  push:
    tags:
      - 'v*.*.*'

# Restrict concurrent deployments
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.4'
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: '1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # JOB: Pre-flight Checks
  # ============================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
      image-tag: ${{ steps.check.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deployment parameters
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            VERSION="${{ github.event.inputs.version }}"
            
            # Determine image tag
            if [ "$VERSION" == "latest" ]; then
              IMAGE_TAG="latest"
            elif [[ "$VERSION" == v* ]]; then
              IMAGE_TAG="$VERSION"
            else
              IMAGE_TAG="sha-${{ github.sha }}"
            fi
            
            echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "environment=${ENV}" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            # Tag push - extract version
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "image-tag=${VERSION}" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate deployment
        run: |
          echo "🚀 Deployment Configuration:"
          echo "  Environment: ${{ steps.check.outputs.environment }}"
          echo "  Image Tag: ${{ steps.check.outputs.image-tag }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"

  # ============================================
  # JOB: Run Tests Before Deployment
  # ============================================
  pre-deploy-tests:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run linting
        run: bun run lint

      - name: Run type check
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun run test
        env:
          DATABASE_URL: file:./test.db
          NEXTAUTH_SECRET: test-secret-for-deploy

      - name: Build application
        run: bun run build
        env:
          DATABASE_URL: file:./test.db
          NEXTAUTH_SECRET: test-secret-for-deploy
          NEXTAUTH_URL: http://localhost:3000

  # ============================================
  # JOB: Build Docker Image
  # ============================================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [preflight, pre-deploy-tests]
    if: always() && needs.preflight.outputs.should-deploy == 'true' && (needs.pre-deploy-tests.result == 'success' || needs.pre-deploy-tests.result == 'skipped')
    permissions:
      contents: read
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.preflight.outputs.image-tag }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.event.inputs.environment == 'production' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ============================================
  # JOB: Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [preflight, build-image]
    if: github.event.inputs.environment == 'staging' || (github.event_name == 'push' && contains(github.ref, 'beta'))
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'https://staging.restaurant-os.app' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        run: |
          echo "🚀 Deploying to Staging..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.preflight.outputs.image-tag }}"
          
          # Placeholder for actual deployment script
          # This could be SSH to server, Kubernetes deployment, etc.
          
          # Example: SSH deployment
          # ssh ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} << 'EOF'
          #   docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.preflight.outputs.image-tag }}
          #   docker-compose -f docker-compose.prod.yml up -d
          # EOF

      - name: Run database migrations
        run: |
          echo "Running database migrations on staging..."
          # bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Health check
        run: |
          echo "Performing health check..."
          # curl -f ${{ vars.STAGING_URL }}/api/health || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🚀 Staging deployment successful!
            Environment: Staging
            Version: ${{ needs.preflight.outputs.image-tag }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # JOB: Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [preflight, build-image]
    if: github.event.inputs.environment == 'production' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://restaurant-os.app' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deploying ${{ needs.preflight.outputs.image-tag }}`
            });
            console.log('Deployment created:', deployment.data.id);

      - name: Pull Docker image
        run: |
          echo "📦 Pulling Docker image..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.preflight.outputs.image-tag }}

      - name: Deploy to production server
        run: |
          echo "🚀 Deploying to Production..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.preflight.outputs.image-tag }}"
          
          # Placeholder for actual deployment script
          # Example options:
          # 1. SSH deployment
          # 2. Kubernetes kubectl
          # 3. AWS ECS
          # 4. DigitalOcean App Platform
          # 5. Vercel
          
          # Example SSH deployment:
          # ssh ${{ secrets.PRODUCTION_SSH_USER }}@${{ secrets.PRODUCTION_SSH_HOST }} << 'EOF'
          #   cd /app
          #   docker-compose pull
          #   docker-compose up -d --no-deps --build app
          #   docker image prune -f
          # EOF

      - name: Run database migrations
        run: |
          echo "Running database migrations on production..."
          echo "⚠️ Migrations should be reviewed before running in production!"
          # bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          sleep 30
          
          # Health check with retries
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f ${{ vars.PRODUCTION_URL }}/api/health 2>/dev/null; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in 10 seconds..."
            sleep 10
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.deployment.id,
              state: 'success',
              environment_url: '${{ vars.PRODUCTION_URL }}',
              description: 'Deployment successful'
            });

      - name: Create GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docker-compose.prod.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🎉 Production deployment successful!
            Environment: Production
            Version: ${{ needs.preflight.outputs.image-tag }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            URL: ${{ vars.PRODUCTION_URL }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # JOB: Rollback (Manual)
  # ============================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    environment:
      name: production
    steps:
      - name: Get previous deployment
        id: previous
        run: |
          echo "Fetching previous deployment..."
          # In a real scenario, fetch the previous stable version
          echo "previous-tag=previous-stable" >> $GITHUB_OUTPUT

      - name: Rollback to previous version
        run: |
          echo "🔄 Rolling back to previous version..."
          echo "Previous version: ${{ steps.previous.outputs.previous-tag }}"
          # Actual rollback logic would go here

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ⚠️ Deployment rolled back!
            Environment: ${{ github.event.inputs.environment }}
            Reason: Deployment failed health checks
            Actor: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # JOB: Post-deployment Smoke Tests
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always() && (needs.deploy-production.result == 'success' || needs.deploy-staging.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # bunx playwright test --project=smoke
          # Or curl-based health checks
          
          # Basic health check
          curl -f ${{ vars.PRODUCTION_URL || vars.STAGING_URL }}/api/health
          
          # API endpoint checks
          curl -f ${{ vars.PRODUCTION_URL || vars.STAGING_URL }}/api/docs

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7

  # ============================================
  # JOB: Cleanup Old Images
  # ============================================
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always()
    permissions:
      packages: write
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-pre-release-versions: true
