# ============================================
# Restaurant OS - Production Docker Compose
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-restaurant_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-network

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: restaurant-os-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
    container_name: restaurant-os-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-restaurant_os}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - ORANGE_MONEY_WEBHOOK_SECRET=${ORANGE_MONEY_WEBHOOK_SECRET}
      - MTN_MOMO_SUBSCRIPTION_KEY=${MTN_MOMO_SUBSCRIPTION_KEY}
      - WAVE_WEBHOOK_SECRET=${WAVE_WEBHOOK_SECRET}
      - MPESA_PASSKEY=${MPESA_PASSKEY}
      - SENTRY_DSN=${SENTRY_DSN}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - restaurant-network

  # Caddy Reverse Proxy (with auto HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: restaurant-os-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - restaurant-network

  # Optional: Real-time WebSocket service
  realtime:
    build:
      context: ./mini-services/realtime-service
      dockerfile: Dockerfile
    container_name: restaurant-os-realtime
    restart: unless-stopped
    environment:
      - PORT=3001
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
    ports:
      - "${REALTIME_PORT:-3001}:3001"
    depends_on:
      - redis
    networks:
      - restaurant-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  restaurant-network:
    driver: bridge
