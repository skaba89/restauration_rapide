services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "3010:3000"
    environment:
      - DATABASE_URL=file:/app/data/restaurant.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - NEXT_PUBLIC_APP_URL=http://localhost:3010
      - NEXT_PUBLIC_WS_URL=ws://localhost:3003
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped

  # WebSocket Service
  realtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.realtime
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: unless-stopped

  # Redis Cache (optional, for scaling)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    profiles:
      - production

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - app
      - realtime
    restart: unless-stopped
    profiles:
      - production

volumes:
  redis_data:
