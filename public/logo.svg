<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Plate -->
  <ellipse cx="256" cy="280" rx="140" ry="100" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="256" cy="280" rx="120" ry="85" fill="#fef3c7"/>
  
  <!-- Fork -->
  <g fill="#ffffff">
    <rect x="120" y="180" width="8" height="120" rx="4"/>
    <rect x="110" y="180" width="28" height="8" rx="2"/>
    <rect x="114" y="165" width="4" height="25" rx="2"/>
    <rect x="122" y="165" width="4" height="25" rx="2"/>
    <rect x="130" y="165" width="4" height="25" rx="2"/>
  </g>
  
  <!-- Knife -->
  <g fill="#ffffff">
    <rect x="384" y="180" width="8" height="120" rx="4"/>
    <path d="M392 180 L392 165 L420 180 L392 195 Z" rx="2"/>
  </g>
  
  <!-- Food on plate -->
  <ellipse cx="256" cy="270" rx="70" ry="45" fill="#fbbf24"/>
  <ellipse cx="256" cy="265" rx="50" ry="30" fill="#f59e0b"/>
  
  <!-- Steam lines -->
  <g stroke="#ffffff" stroke-width="4" fill="none" opacity="0.8">
    <path d="M220 180 Q230 160 220 140"/>
    <path d="M256 175 Q266 155 256 135"/>
    <path d="M292 180 Q302 160 292 140"/>
  </g>
  
  <!-- Africa map subtle outline -->
  <path d="M380 320 Q400 340 390 380 Q380 420 350 440 Q320 460 280 450 Q240 440 220 410 Q200 380 210 350 Q220 320 250 310 Q280 300 320 310 Q360 320 380 320 Z" 
        fill="#ffffff" opacity="0.15"/>
</svg>
