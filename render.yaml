# KFM DELICE - Configuration de déploiement Render

services:
  - type: web
    name: kfm-delice
    env: node
    region: frankfurt
    branch: master
    # Install ALL dependencies (including devDependencies) then build
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    plan: free

    # Health check
    healthCheckPath: /

    # Auto-deploy on push
    autoDeploy: true

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production

      - key: NEXT_PUBLIC_APP_NAME
        value: KFM DELICE

      # Database - NEON PostgreSQL
      - key: DATABASE_URL
        sync: false

      # Pusher - Realtime
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_KEY
        sync: false
      - key: PUSHER_SECRET
        sync: false
      - key: NEXT_PUBLIC_PUSHER_KEY
        sync: false
      - key: NEXT_PUBLIC_PUSHER_CLUSTER
        value: eu

      # Cloudinary - Images
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Auth
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
